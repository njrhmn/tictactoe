<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>

<body>
    <div id="status">Giliran Pemain X</div>
    <div id="board"></div>
    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h2>Siapa Bermain? ☁️</h2>
            <input type="text" id="player1Input" placeholder="Nama Pemain X">
            <input type="text" id="player2Input" placeholder="Nama Pemain O">
            <button onclick="saveNames()">Start Game!</button>
        </div>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2 id="winText">Pemenang! 🎉</h2>
            <button onclick="resetGame()">Main Lagi</button>
            <button onclick="changePlayers()" style="background-color: #a0a0a0;">Tukar Pemain</button>
        </div>
    </div>
    <button onclick="resetGame()">Reset Game</button>

    <audio id="audioX" src="sound/pop.mp3"></audio>
    <audio id="audioO" src="sound/noot.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
